    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script>
        const signupForm = document.getElementById('signupForm');
        const messageBox = document.getElementById('message');

        const degreeSelect = document.getElementById('degree');
        const positionField = document.getElementById('positionField');
        const positionSelect = document.getElementById('position');

        degreeSelect.addEventListener('change', () => {
            if (degreeSelect.value === 'Mestre') {
                positionField.classList.remove('hidden');
            } else {
                positionField.classList.add('hidden');
                positionSelect.value = '';
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageBox.classList.add('hidden');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const cim = document.getElementById('cim').value;
            const degree = document.getElementById('degree').value;
            const position = document.getElementById('position').value;

            // Enviar para Supabase
            const { data, error } = await window.supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullName,
                        cim: cim,
                        degree: degree,
                        position: position
                    }
                }
            });

            if (error) {
                messageBox.textContent = "Erro: " + error.message;
                messageBox.className = "text-center text-xs p-4 bg-red-500/10 text-red-400 border-red-500/20 rounded-lg mt-4 block";
                messageBox.classList.remove('hidden');
                return;
            }

            messageBox.innerHTML = "<b>Solicitação enviada!</b><br>Verifique seu e-mail para confirmar a conta e aguarde a aprovação do administrador.";
            messageBox.className = "text-center text-xs p-4 bg-secondary/10 text-secondary border-secondary/20 rounded-lg mt-4 block";
            messageBox.classList.remove('hidden');
            signupForm.reset();
        });
    </script>
